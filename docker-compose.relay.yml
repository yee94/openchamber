services:
  relay:
    build:
      context: .
      dockerfile: Dockerfile.relay
    # Loopback publishing supports an external TLS proxy on the host.
    # Public binding requires compose, firewall, and TLS configuration; repository defaults to loopback.
    ports:
      - "127.0.0.1:${OPENCHAMBER_RELAY_PUBLISHED_PORT:-8787}:8787"
    environment:
      OPENCHAMBER_RELAY_SERVER_PUBLIC_URL: ${OPENCHAMBER_RELAY_SERVER_PUBLIC_URL:-}
      OPENCHAMBER_RELAY_SERVER_TRUST_PROXY: ${OPENCHAMBER_RELAY_SERVER_TRUST_PROXY:-}
      OPENCHAMBER_RELAY_SERVER_MAX_HOSTS: ${OPENCHAMBER_RELAY_SERVER_MAX_HOSTS:-}
      OPENCHAMBER_RELAY_SERVER_MAX_SOCKETS: ${OPENCHAMBER_RELAY_SERVER_MAX_SOCKETS:-}
      OPENCHAMBER_RELAY_SERVER_MAX_CONNECTIONS: ${OPENCHAMBER_RELAY_SERVER_MAX_CONNECTIONS:-}
      OPENCHAMBER_RELAY_SERVER_MAX_CLIENTS_PER_HOST: ${OPENCHAMBER_RELAY_SERVER_MAX_CLIENTS_PER_HOST:-}
      OPENCHAMBER_RELAY_SERVER_MAX_CLIENTS_PER_IP: ${OPENCHAMBER_RELAY_SERVER_MAX_CLIENTS_PER_IP:-}
      OPENCHAMBER_RELAY_SERVER_MAX_PENDING_CLIENTS: ${OPENCHAMBER_RELAY_SERVER_MAX_PENDING_CLIENTS:-}
      OPENCHAMBER_RELAY_SERVER_MAX_RAW_SOCKETS: ${OPENCHAMBER_RELAY_SERVER_MAX_RAW_SOCKETS:-}
      OPENCHAMBER_RELAY_SERVER_MAX_RAW_SOCKETS_PER_IP: ${OPENCHAMBER_RELAY_SERVER_MAX_RAW_SOCKETS_PER_IP:-}
      OPENCHAMBER_RELAY_SERVER_MAX_FRAME_BYTES: ${OPENCHAMBER_RELAY_SERVER_MAX_FRAME_BYTES:-}
      OPENCHAMBER_RELAY_SERVER_MAX_QUEUED_BYTES_PER_CONNECTION: ${OPENCHAMBER_RELAY_SERVER_MAX_QUEUED_BYTES_PER_CONNECTION:-}
      OPENCHAMBER_RELAY_SERVER_MAX_GLOBAL_QUEUED_BYTES: ${OPENCHAMBER_RELAY_SERVER_MAX_GLOBAL_QUEUED_BYTES:-}
    # External reverse proxies terminate public TLS; this container serves HTTP and WebSocket traffic.
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
